name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test API ──────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install API dependencies
        run: pnpm install
        working-directory: apps/api

      - name: Run ESLint on API
        run: npx eslint src/ --ext .js || true
        working-directory: apps/api

      - name: Run API tests
        run: pnpm test || true
        working-directory: apps/api

  # ── Lint & Test Web ──────────────────────────────────────────────────────
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Web dependencies
        run: pnpm install
        working-directory: apps/web

      - name: Build Next.js app
        run: pnpm build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://meeting-api.onrender.com
          NEXT_PUBLIC_WS_URL: wss://meeting-api.onrender.com

  # ── Build Docker Images ──────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/meeting-api:latest
            ghcr.io/${{ github.repository_owner }}/meeting-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/meeting-web:latest
            ghcr.io/${{ github.repository_owner }}/meeting-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max